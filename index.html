<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HOU · AI决策引擎</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg: #020204;
      --surface: #0e0e12;
      --surface2: #16161c;
      --border: #1e1e28;
      --primary: #FF4500;
      --primary2: #FF8C00;
      --accent: #00D4FF;
      --glow: rgba(255,69,0,0.35);
      --glow-blue: rgba(0,212,255,0.2);
      --text: #e8e8f0;
      --text2: #44445a;
    }
    html, body { height: 100%; overflow: hidden; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Segoe UI', sans-serif;
    }

    body::before {
      content: '';
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background-image:
        linear-gradient(rgba(0,212,255,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,212,255,0.03) 1px, transparent 1px);
      background-size: 60px 60px;
    }
    body::after {
      content: '';
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background: radial-gradient(ellipse 70% 60% at 50% 45%,
        rgba(255,69,0,0.06) 0%, rgba(0,212,255,0.03) 50%, transparent 100%);
    }

    .scanline {
      position: fixed; left: 0; right: 0; z-index: 1; pointer-events: none;
      height: 2px;
      background: linear-gradient(90deg, transparent, rgba(0,212,255,0.4), rgba(255,69,0,0.3), transparent);
      animation: scan 6s linear infinite;
      box-shadow: 0 0 18px rgba(0,212,255,0.3);
    }
    @keyframes scan { from { top: -2px; } to { top: 100vh; } }

    .corner { position: fixed; z-index: 1; pointer-events: none; width: 28px; height: 28px; }
    .corner::before, .corner::after { content: ''; position: absolute; background: var(--accent); }
    .corner::before { width: 100%; height: 1.5px; }
    .corner::after  { width: 1.5px; height: 100%; }
    .c-tl { top: 20px; left: 20px; }
    .c-tr { top: 20px; right: 20px; transform: scaleX(-1); }
    .c-bl { bottom: 20px; left: 20px; transform: scaleY(-1); }
    .c-br { bottom: 20px; right: 20px; transform: scale(-1); }
    .corner { opacity: 0.5; }

    #particles { position: fixed; inset: 0; z-index: 0; pointer-events: none; }

    /* ── 登录页 ── */
    #loginScreen {
      position: fixed; inset: 0; z-index: 10;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
    }
    .login-tag {
      font-size: 17px; font-weight: 700; letter-spacing: 6px;
      text-transform: uppercase; margin-bottom: 18px; color: #fff;
      text-shadow: 0 0 20px rgba(0,212,255,0.8), 0 0 40px rgba(0,212,255,0.4);
      display: flex; align-items: center; gap: 12px;
    }
    .login-tag::before, .login-tag::after {
      content: ''; flex: 1; height: 1px;
      background: linear-gradient(90deg, transparent, rgba(0,212,255,0.5));
    }
    .login-tag::after { background: linear-gradient(90deg, rgba(0,212,255,0.5), transparent); }
    .login-logo {
      font-size: 100px; font-weight: 900; letter-spacing: -6px;
      background: linear-gradient(135deg, #FF4500 0%, #FF8C00 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      filter: drop-shadow(0 0 50px rgba(255,69,0,0.6));
      line-height: 1; margin-bottom: 6px;
      animation: logoGlow 3s ease-in-out infinite alternate;
    }
    @keyframes logoGlow {
      from { filter: drop-shadow(0 0 30px rgba(255,69,0,0.4)); }
      to   { filter: drop-shadow(0 0 70px rgba(255,140,0,0.7)); }
    }
    .login-sub {
      color: #3a3a50; font-size: 12px; letter-spacing: 2px;
      margin-bottom: 56px; text-align: center; line-height: 1.8;
    }
    .login-sub .line2 { display: block; font-size: 14px; color: #4a4a62; letter-spacing: 2px; }
    .login-card {
      background: rgba(10,10,14,0.9); backdrop-filter: blur(30px);
      border: 1px solid rgba(0,212,255,0.12); border-radius: 20px;
      padding: 36px; width: 340px;
      box-shadow: 0 0 80px rgba(0,0,0,0.8), 0 0 40px rgba(255,69,0,0.08),
                  inset 0 1px 0 rgba(255,255,255,0.04), inset 0 0 60px rgba(0,212,255,0.02);
    }
    .login-label { font-size: 11px; letter-spacing: 3px; color: var(--text2); text-transform: uppercase; margin-bottom: 10px; }
    .login-card input {
      width: 100%; background: var(--surface2); border: 1px solid var(--border);
      border-radius: 10px; padding: 14px 16px; color: var(--text); font-size: 15px;
      outline: none; margin-bottom: 16px; transition: border-color 0.3s, box-shadow 0.3s;
    }
    .login-card input:focus { border-color: var(--primary); box-shadow: 0 0 20px rgba(255,69,0,0.2); }
    .login-card input::placeholder { color: #2a2a38; }
    .login-err { color: #ff4444; font-size: 12px; margin-bottom: 12px; display: none; }
    .btn-fire {
      width: 100%; background: linear-gradient(135deg, #FF4500, #FF8C00);
      border: none; border-radius: 10px; padding: 14px;
      color: #fff; font-size: 15px; font-weight: 700; cursor: pointer;
      letter-spacing: 2px; position: relative; overflow: hidden;
      transition: opacity 0.2s, transform 0.1s;
    }
    .btn-fire::before {
      content: ''; position: absolute; top: -50%; left: -60%;
      width: 40%; height: 200%; background: rgba(255,255,255,0.15);
      transform: skewX(-20deg); animation: shimmer 3s infinite;
    }
    @keyframes shimmer { 0% { left: -60%; } 100% { left: 140%; } }
    .btn-fire:hover { opacity: 0.88; }
    .btn-fire:active { transform: scale(0.98); }

    /* ── 聊天页 ── */
    #chatScreen {
      display: none; flex-direction: row; height: 100vh; position: relative; z-index: 5;
    }

    /* ── 侧边栏 ── */
    .sidebar {
      width: 240px; flex-shrink: 0;
      background: rgba(10,10,14,0.95);
      border-right: 1px solid var(--border);
      display: flex; flex-direction: column;
      position: relative; z-index: 6;
      transition: transform 0.25s ease;
    }
    .sidebar-header {
      padding: 16px 16px 14px;
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
      flex-shrink: 0;
    }
    .s-logo {
      font-size: 20px; font-weight: 900; letter-spacing: -1px;
      background: linear-gradient(135deg, #FF4500, #FF8C00);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      filter: drop-shadow(0 0 8px rgba(255,69,0,0.4));
    }
    .s-new {
      background: none; border: 1px solid var(--border); border-radius: 7px;
      width: 30px; height: 30px; cursor: pointer; color: var(--text2);
      font-size: 18px; line-height: 1; display: flex; align-items: center; justify-content: center;
      transition: all 0.2s;
    }
    .s-new:hover { border-color: var(--primary); color: var(--primary); box-shadow: 0 0 10px var(--glow); }
    .history-list {
      flex: 1; overflow-y: auto; padding: 8px 6px;
    }
    .history-list::-webkit-scrollbar { width: 2px; }
    .history-list::-webkit-scrollbar-thumb { background: #1e1e28; border-radius: 2px; }
    .history-empty {
      padding: 28px 12px; text-align: center;
      color: var(--text2); font-size: 12px; letter-spacing: 0.5px; line-height: 1.8;
    }
    .history-item {
      padding: 9px 12px; border-radius: 8px; cursor: pointer;
      margin-bottom: 2px; transition: background 0.15s;
      border: 1px solid transparent;
      position: relative;
    }
    .history-item:hover { background: var(--surface2); }
    .history-item.active {
      background: rgba(255,69,0,0.08);
      border-color: rgba(255,69,0,0.2);
    }
    .hi-title {
      font-size: 13px; color: var(--text);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .hi-time { font-size: 10px; color: var(--text2); margin-top: 3px; }
    .hi-del {
      position: absolute; right: 8px; top: 50%; transform: translateY(-50%);
      background: none; border: none; color: var(--text2); cursor: pointer;
      font-size: 14px; opacity: 0; transition: opacity 0.15s;
      padding: 2px 4px; border-radius: 4px;
    }
    .history-item:hover .hi-del { opacity: 1; }
    .hi-del:hover { color: #ff4444; }

    /* 移动端侧边栏遮罩 */
    .sidebar-overlay {
      display: none; position: fixed; inset: 0; z-index: 5;
      background: rgba(0,0,0,0.6);
    }
    .sidebar-overlay.show { display: block; }

    /* ── 主聊天区 ── */
    .chat-main {
      flex: 1; display: flex; flex-direction: column; min-width: 0;
    }
    .chat-header {
      background: rgba(14,14,18,0.9); backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
      padding: 0 24px; height: 58px;
      display: flex; align-items: center; justify-content: space-between;
      flex-shrink: 0;
    }
    .h-left { display: flex; align-items: center; gap: 12px; }
    .h-menu {
      display: none; background: none; border: none;
      color: var(--text2); cursor: pointer; font-size: 18px; padding: 4px;
    }
    .h-logo {
      font-size: 20px; font-weight: 900; letter-spacing: -1px;
      background: linear-gradient(135deg, #FF4500, #FF8C00);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      filter: drop-shadow(0 0 8px rgba(255,69,0,0.4));
    }
    .h-divider { width: 1px; height: 16px; background: var(--border); }
    .h-model {
      font-size: 11px; color: var(--text2); letter-spacing: 1px;
      display: flex; align-items: center; gap: 6px;
    }
    .h-dot {
      width: 5px; height: 5px; border-radius: 50%;
      background: #FF4500; box-shadow: 0 0 6px #FF4500;
      animation: blink 2s ease-in-out infinite;
    }
    @keyframes blink { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }

    .messages {
      flex: 1; overflow-y: auto; padding: 28px 28px;
      display: flex; flex-direction: column; gap: 18px;
    }
    .messages::-webkit-scrollbar { width: 3px; }
    .messages::-webkit-scrollbar-thumb { background: #1e1e28; border-radius: 2px; }

    .msg {
      max-width: 76%; line-height: 1.75; font-size: 15px;
      padding: 14px 18px; border-radius: 14px; word-break: break-word;
    }
    .msg.user {
      background: linear-gradient(135deg, #FF4500, #FF8C00);
      color: #fff; align-self: flex-end; border-bottom-right-radius: 4px;
      box-shadow: 0 4px 24px rgba(255,69,0,0.3);
    }
    .msg.bot {
      background: rgba(22,22,28,0.95); border: 1px solid var(--border);
      align-self: flex-start; border-bottom-left-radius: 4px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.4);
    }
    .msg.bot strong { color: #FF8C00; }

    .empty-hint {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 10px; user-select: none;
    }
    .empty-big {
      font-size: 52px; font-weight: 900; letter-spacing: -3px;
      background: linear-gradient(135deg, #FF4500, #FF8C00);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      filter: drop-shadow(0 0 30px rgba(255,69,0,0.35));
    }
    .empty-small { font-size: 12px; color: var(--text2); letter-spacing: 3px; }
    .empty-tags { display: flex; gap: 8px; margin-top: 8px; flex-wrap: wrap; justify-content: center; }
    .tag {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 20px; padding: 5px 14px; font-size: 11px; color: var(--text2);
      cursor: pointer; transition: all 0.2s; letter-spacing: 0.5px;
    }
    .tag:hover { border-color: var(--primary); color: var(--primary); box-shadow: 0 0 10px var(--glow); }

    .typing {
      display: flex; gap: 5px; align-items: center;
      padding: 16px 18px; align-self: flex-start;
      background: rgba(22,22,28,0.95); border: 1px solid var(--border);
      border-radius: 14px; border-bottom-left-radius: 4px;
    }
    .dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: linear-gradient(135deg, #FF4500, #FF8C00);
      animation: bounce 1.2s ease-in-out infinite;
    }
    .dot:nth-child(2) { animation-delay: 0.18s; }
    .dot:nth-child(3) { animation-delay: 0.36s; }
    @keyframes bounce {
      0%,80%,100% { transform: translateY(0); opacity: 0.3; }
      40% { transform: translateY(-7px); opacity: 1; }
    }

    .input-area {
      background: rgba(14,14,18,0.9); backdrop-filter: blur(20px);
      border-top: 1px solid var(--border);
      padding: 16px 24px; display: flex; gap: 12px; align-items: flex-end;
      flex-shrink: 0;
    }
    #userInput {
      flex: 1; background: var(--surface2); border: 1px solid var(--border);
      border-radius: 12px; padding: 13px 16px; color: var(--text); font-size: 15px;
      outline: none; resize: none; min-height: 48px; max-height: 160px;
      line-height: 1.6; font-family: inherit;
      transition: border-color 0.3s, box-shadow 0.3s;
    }
    #userInput:focus { border-color: var(--primary); box-shadow: 0 0 20px rgba(255,69,0,0.15); }
    #userInput::placeholder { color: #2a2a38; }
    .send-btn {
      background: linear-gradient(135deg, #FF4500, #FF8C00);
      border: none; border-radius: 12px; width: 48px; height: 48px;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; box-shadow: 0 0 20px rgba(255,69,0,0.3);
      transition: opacity 0.2s, transform 0.1s, box-shadow 0.2s;
    }
    .send-btn:hover { opacity: 0.88; box-shadow: 0 0 30px rgba(255,69,0,0.5); }
    .send-btn:active { transform: scale(0.95); }
    .send-btn svg { width: 20px; height: 20px; fill: white; }

    .cursor { display: inline-block; width: 2px; height: 1em; background: var(--primary); margin-left: 2px; vertical-align: text-bottom; animation: cur 0.8s step-end infinite; }
    @keyframes cur { 0%,100%{opacity:1} 50%{opacity:0} }

    /* 移动端适配 */
    @media (max-width: 680px) {
      .sidebar {
        position: fixed; top: 0; left: 0; bottom: 0; z-index: 20;
        transform: translateX(-100%);
      }
      .sidebar.open { transform: translateX(0); }
      .h-menu { display: block; }
      .chat-header { padding: 0 16px; }
      .messages { padding: 20px 16px; }
      .input-area { padding: 12px 16px; }
      .msg { max-width: 90%; }
    }
  </style>
</head>

<div class="scanline"></div>
<div class="corner c-tl"></div>

<!-- 登录页 -->
<div id="loginScreen">
  <div class="login-tag">你的赛博资本家分身</div>
  <div class="login-logo">HOU</div>
  <div class="login-sub">
    <span class="line2">为你量身定制的变强工具</span>
  </div>
  <div class="login-card">

<!-- 聊天页 -->
<div id="chatScreen">
  <!-- 侧边栏遮罩（移动端） -->
  <div class="sidebar-overlay" id="sidebarOverlay" onclick="closeSidebar()"></div>

  <!-- 侧边栏 -->
  <div class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="s-logo">HOU</div>
      <button class="s-new" title="新对话" onclick="newChat()">＋</button>

      <div class="history-empty">还没有历史对话<br>开始你的第一次对话</div>

        onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
      <button class="send-btn" onclick="sendMsg()">
        <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
      </button>
    </div>
  </div>
</div>

<script>
/* ── 粒子背景 ── */
(function(){
  const canvas = document.getElementById('particles');
  const ctx = canvas.getContext('2d');
  let W, H, pts;
  const N = 130, MAX_DIST = 150;
  function resize(){ W = canvas.width = innerWidth; H = canvas.height = innerHeight; }
  function init(){
    pts = Array.from({length:N}, (_,i)=>({
      x: Math.random()*W, y: Math.random()*H,
      vx: (Math.random()-.5)*.45, vy: (Math.random()-.5)*.45,
      r: Math.random()*1.8+.5, blue: i < N*0.3
    }));
  }
  function draw(){
    ctx.clearRect(0,0,W,H);
    pts.forEach(p=>{
      p.x += p.vx; p.y += p.vy;
      if(p.x<0||p.x>W) p.vx*=-1;
      if(p.y<0||p.y>H) p.vy*=-1;
      ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
      ctx.fillStyle = p.blue ? 'rgba(0,212,255,0.6)' : 'rgba(255,69,0,0.55)';
      ctx.fill();
      if(p.r > 1.4){
        ctx.beginPath(); ctx.arc(p.x,p.y,p.r*2.5,0,Math.PI*2);
        ctx.fillStyle = p.blue ? 'rgba(0,212,255,0.08)' : 'rgba(255,69,0,0.08)';
        ctx.fill();
      }
    });
    for(let i=0;i<N;i++) for(let j=i+1;j<N;j++){
      const dx=pts[i].x-pts[j].x, dy=pts[i].y-pts[j].y;
      const d=Math.sqrt(dx*dx+dy*dy);
      if(d<MAX_DIST){
        const a = .22*(1-d/MAX_DIST);
        const mixed = pts[i].blue !== pts[j].blue;
        ctx.beginPath(); ctx.moveTo(pts[i].x,pts[i].y); ctx.lineTo(pts[j].x,pts[j].y);
        ctx.strokeStyle = mixed ? `rgba(128,180,200,${a*0.8})` : pts[i].blue ? `rgba(0,212,255,${a})` : `rgba(255,69,0,${a})`;
        ctx.lineWidth = .6; ctx.stroke();
      }
    }
    requestAnimationFrame(draw);
  }
  window.addEventListener('resize', ()=>{ resize(); init(); });
  resize(); init(); draw();
})();

/* ── 系统提示词 ── */
const SYSTEM = `你是HOU，专为商业决策和认知升级打造的AI引擎。

身份：当被问到"你是什么AI""你是哪个模型"时，回答：我是HOU，一个专注于商业决策和认知升级的AI引擎，基于DeepSeek V4 Pro构建。

核心能力：
- 商业破局：帮用户找到别人看不到的突破口
- 决策分析：把复杂问题拆成清晰选项和代价
- 认知升级：用底层逻辑帮用户穿透表象
- 执行转化：把模糊想法变成今天能动手的第一步

风格铁律：
- 直接给结论，不绕弯子，不废话
- 用数字和逻辑说话
- 结尾给出具体的下一步行动
- 像顶级商业顾问，不像教科书
- 这是付费专业服务，每个回答都要让用户觉得钱花得值`;

/* ── 历史对话管理 ── */
const STORAGE_KEY = 'hou_sessions';
let currentSessionId = null;
let msgs = [];
let pwd = '';

function getSessions() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; }
  catch { return []; }
}

function saveSessions(sessions) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(sessions));
}

function saveCurrentSession() {
  if (msgs.length === 0) return;
  const sessions = getSessions();
  const title = msgs.find(m => m.role === 'user')?.content?.slice(0, 24) || '新对话';
  if (!currentSessionId) currentSessionId = Date.now().toString();
  const idx = sessions.findIndex(s => s.id === currentSessionId);
  const session = { id: currentSessionId, title, messages: msgs, updatedAt: Date.now() };
  if (idx >= 0) sessions[idx] = session;
  else sessions.unshift(session);
  saveSessions(sessions);
  renderHistory();
}

function deleteSession(id, e) {
  e.stopPropagation();
  const sessions = getSessions().filter(s => s.id !== id);
  saveSessions(sessions);
  if (currentSessionId === id) {
    currentSessionId = null;
    msgs = [];
    showEmpty();
  }
  renderHistory();
}

function loadSession(id) {
  const session = getSessions().find(s => s.id === id);
  if (!session) return;
  currentSessionId = id;
  msgs = [...session.messages];
  const m = document.getElementById('messages');
  m.innerHTML = '';
  msgs.forEach(msg => {
    if (msg.role === 'system') return;
    const div = document.createElement('div');
    div.className = `msg ${msg.role === 'user' ? 'user' : 'bot'}`;
    div.innerHTML = fmt(msg.content);
    m.appendChild(div);
  });
  scrollBot();
  renderHistory();
  if (window.innerWidth <= 680) closeSidebar();
}

function formatTime(ts) {
  const d = new Date(ts);
  const now = new Date();
  if (d.toDateString() === now.toDateString()) {
    return d.toLocaleTimeString('zh', { hour: '2-digit', minute: '2-digit' });
  }
  const diff = now - d;
  if (diff < 86400000 * 2) return '昨天';
  return `${d.getMonth()+1}月${d.getDate()}日`;
}

function esc(t) {
  return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function renderHistory() {
  const sessions = getSessions();
  const list = document.getElementById('historyList');
  if (sessions.length === 0) {
    list.innerHTML = '<div class="history-empty">还没有历史对话<br>开始你的第一次对话</div>';
    return;
  }
  list.innerHTML = sessions.map(s => `
    <div class="history-item ${s.id === currentSessionId ? 'active' : ''}" onclick="loadSession('${s.id}')">
      <div class="hi-title">${esc(s.title)}</div>
      <div class="hi-time">${formatTime(s.updatedAt)}</div>
      <button class="hi-del" onclick="deleteSession('${s.id}', event)" title="删除">×</button>
    </div>
  `).join('');
}

/* ── 侧边栏控制 ── */
function toggleSidebar() {
  const sb = document.getElementById('sidebar');
  const ov = document.getElementById('sidebarOverlay');
  sb.classList.toggle('open');
  ov.classList.toggle('show');
}
function closeSidebar() {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('sidebarOverlay').classList.remove('show');
}

/* ── 登录 ── */
document.getElementById('pwdInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') doLogin();
});

async function doLogin() {
  const p = document.getElementById('pwdInput').value.trim();
  if (!p) return;
  try {
    const r = await fetch('/api/auth', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({password:p}) });
    const d = await r.json();
    if (d.ok) {
      pwd = p;
      document.getElementById('loginScreen').style.display = 'none';
      document.getElementById('chatScreen').style.display = 'flex';
      renderHistory();
      showEmpty();
    } else {
      document.getElementById('loginErr').style.display = 'block';
    }
  } catch {
    document.getElementById('loginErr').style.display = 'block';
  }
}

/* ── 聊天 ── */
const TAGS = ['我的生意遇到瓶颈', '帮我分析这个机会', '我该如何做决策', '帮我突破认知'];

function showEmpty() {
  const m = document.getElementById('messages');
  m.innerHTML = '';
  const h = document.createElement('div');
  h.className = 'empty-hint'; h.id = 'emptyHint';
  h.innerHTML = `<div class="empty-big">HOU</div><div class="empty-small">把你的问题告诉我</div><div class="empty-tags">${TAGS.map(t=>`<div class="tag" onclick="quickSend('${t}')">${t}</div>`).join('')}</div>`;
  m.appendChild(h);
}

function quickSend(text) {
  document.getElementById('userInput').value = text;
  sendMsg();
}

function newChat() {
  saveCurrentSession();
  currentSessionId = null;
  msgs = [];
  showEmpty();
  if (window.innerWidth <= 680) closeSidebar();
}

function addMsg(role, text) {
  const hint = document.getElementById('emptyHint');
  if (hint) hint.remove();
  const div = document.createElement('div');
  div.className = `msg ${role === 'user' ? 'user' : 'bot'}`;
  div.innerHTML = role !== 'user' ? '' : fmt(text);
  document.getElementById('messages').appendChild(div);
  scrollBot();
  return div;
}

function fmt(t) {
  return t
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>')
    .replace(/\n/g,'<br>');
}

function scrollBot() { const m = document.getElementById('messages'); m.scrollTop = m.scrollHeight; }
function handleKey(e) { if (e.key==='Enter' && !e.shiftKey) { e.preventDefault(); sendMsg(); } }
function autoResize(el) { el.style.height = 'auto'; el.style.height = Math.min(el.scrollHeight,160)+'px'; }

async function sendMsg() {
  const inp = document.getElementById('userInput');
  const text = inp.value.trim();
  if (!text) return;
  inp.value = ''; inp.style.height = 'auto';

  addMsg('user', text);
  msgs.push({ role:'user', content:text });

  const loader = document.createElement('div');
  loader.className = 'typing';
  loader.innerHTML = '<div class="dot"></div><div class="dot"></div><div class="dot"></div>';
  document.getElementById('messages').appendChild(loader);
  scrollBot();

  try {
    const res = await fetch('/api/chat', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ messages:[{role:'system',content:SYSTEM},...msgs], password:pwd })
    });
    loader.remove();
    if (!res.ok) { addMsg('bot','连接出错，请稍后重试。'); return; }

    const botDiv = addMsg('bot','');
    const reader = res.body.getReader();
    const dec = new TextDecoder();
    let full = '', buf = '';

    while (true) {
      const {done,value} = await reader.read();
      if (done) break;
      buf += dec.decode(value, {stream:true});
      const lines = buf.split('\n'); buf = lines.pop();
      for (const line of lines) {
        if (!line.startsWith('data: ')) continue;
        const data = line.slice(6);
        if (data === '[DONE]') break;
        try {
          const j = JSON.parse(data);
          const delta = j.choices?.[0]?.delta;
          if (delta?.reasoning_content) continue;
          if (delta?.content) {
            full += delta.content;
            botDiv.innerHTML = fmt(full);
            scrollBot();
          }
        } catch {}
      }
    }
    msgs.push({ role:'assistant', content:full });
    saveCurrentSession();
  } catch {
    loader.remove();
    addMsg('bot','网络错误，请检查连接后重试。');
  }
}
