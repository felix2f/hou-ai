<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>HOU · AI决策引擎</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg: #020204;
      --surface: #0e0e12;
      --surface2: #16161c;
      --border: #1e1e28;
      --primary: #FF4500;
      --primary2: #FF8C00;
      --accent: #00D4FF;
      --glow: rgba(255,69,0,0.35);
      --glow-blue: rgba(0,212,255,0.2);
      --text: #e8e8f0;
      --text2: #44445a;
    }
    html { height: 100%; }
    body { height: 100%; height: 100dvh; overflow: hidden; }
    body {
      background: #1a1a1a;
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Segoe UI', sans-serif;
    }

    /* ── 石材底层（与主页一致）── */
    .stone-layer {
      position: fixed; inset: 0; z-index: 0;
      pointer-events: none; user-select: none;
      overflow: hidden;
      background-color: #1a1a1a;
      background-image:
        radial-gradient(circle, #2b2b2b 1px,   transparent 0),
        radial-gradient(circle, #252525 1px,   transparent 0),
        radial-gradient(circle, #2f2f2f 1.5px, transparent 0),
        radial-gradient(circle, #232323 1px,   transparent 0),
        radial-gradient(circle, #2d2d2d 1px,   transparent 0),
        radial-gradient(circle, #272727 1.5px, transparent 0),
        radial-gradient(circle, #303030 1px,   transparent 0);
      background-size: 37px 41px, 53px 47px, 29px 67px, 71px 31px, 43px 59px, 61px 37px, 23px 53px;
      background-position: 7px 3px, 19px 31px, 11px 22px, 34px 8px, 26px 47px, 8px 15px, 17px 40px;
    }
    .sl-orb { position:absolute; border-radius:50%; will-change:transform; }
    .sl-o1 { width:280px; height:280px; top:8vh;  left:12vw; background:radial-gradient(circle,rgba(255,69,0,.22) 0%,transparent 65%); animation:orb1 11s ease-in-out infinite; }
    .sl-o2 { width:210px; height:210px; top:52vh; left:62vw; background:radial-gradient(circle,rgba(204,55,0,.18) 0%,transparent 60%); animation:orb2 17s linear infinite; }
    .sl-o3 { width:420px; height:420px; top:65vh; left:22vw; background:radial-gradient(circle,rgba(255,69,0,.09) 0%,transparent 55%); animation:orb3 23s ease-in-out infinite; }
    .sl-o4 { width:160px; height:160px; top:24vh; left:77vw; background:radial-gradient(circle,rgba(255,110,0,.26) 0%,transparent 55%); animation:orb4 9s ease-in-out infinite; }
    .sl-o5 { width:300px; height:300px; top:14vh; left:44vw; background:radial-gradient(circle,rgba(180,40,0,.13) 0%,transparent 60%); animation:orb5 19s linear infinite; }
    @keyframes orb1 {
      0%  {transform:translate(0,0);       animation-timing-function:cubic-bezier(.23,1,.32,1)}
      9%  {transform:translate(18vw,33vh); animation-timing-function:cubic-bezier(.755,.05,.855,.06)}
      21% {transform:translate(4vw,60vh);  animation-timing-function:cubic-bezier(.68,-.55,.27,1.55)}
      38% {transform:translate(46vw,11vh); animation-timing-function:cubic-bezier(.23,1,.32,1)}
      47% {transform:translate(63vw,72vh); animation-timing-function:cubic-bezier(.755,.05,.855,.06)}
      61% {transform:translate(29vw,44vh); animation-timing-function:cubic-bezier(.25,.46,.45,.94)}
      73% {transform:translate(-9vw,81vh); animation-timing-function:cubic-bezier(.68,-.55,.27,1.55)}
      89% {transform:translate(56vw,23vh); animation-timing-function:cubic-bezier(.23,1,.32,1)}
      100%{transform:translate(0,0)}
    }
    @keyframes orb2 {
      0%  {transform:translate(0,0);        animation-timing-function:cubic-bezier(.25,.46,.45,.94)}
      7%  {transform:translate(-23vw,-31vh);animation-timing-function:cubic-bezier(.68,-.55,.27,1.55)}
      19% {transform:translate(14vw,-56vh); animation-timing-function:cubic-bezier(.23,1,.32,1)}
      33% {transform:translate(-41vw,11vh); animation-timing-function:cubic-bezier(.755,.05,.855,.06)}
      52% {transform:translate(7vw,36vh);   animation-timing-function:cubic-bezier(.68,-.55,.27,1.55)}
      64% {transform:translate(-16vw,22vh); animation-timing-function:cubic-bezier(.23,1,.32,1)}
      79% {transform:translate(31vw,-26vh); animation-timing-function:cubic-bezier(.25,.46,.45,.94)}
      91% {transform:translate(-6vw,46vh);  animation-timing-function:cubic-bezier(.755,.05,.855,.06)}
      100%{transform:translate(0,0)}
    }
    @keyframes orb3 {
      0%  {transform:translate(0,0);        animation-timing-function:cubic-bezier(.23,1,.32,1)}
      14% {transform:translate(31vw,-41vh); animation-timing-function:cubic-bezier(.755,.05,.855,.06)}
      29% {transform:translate(-21vw,-71vh);animation-timing-function:cubic-bezier(.25,.46,.45,.94)}
      43% {transform:translate(51vw,-19vh); animation-timing-function:cubic-bezier(.68,-.55,.27,1.55)}
      58% {transform:translate(9vw,21vh);   animation-timing-function:cubic-bezier(.23,1,.32,1)}
      71% {transform:translate(-36vw,-11vh);animation-timing-function:cubic-bezier(.755,.05,.855,.06)}
      87% {transform:translate(21vw,-51vh); animation-timing-function:cubic-bezier(.25,.46,.45,.94)}
      100%{transform:translate(0,0)}
    }
    @keyframes orb4 {
      0%  {transform:translate(0,0);        animation-timing-function:cubic-bezier(.68,-.55,.27,1.55)}
      11% {transform:translate(-31vw,41vh); animation-timing-function:cubic-bezier(.23,1,.32,1)}
      28% {transform:translate(-62vw,-14vh);animation-timing-function:cubic-bezier(.755,.05,.855,.06)}
      44% {transform:translate(-11vw,62vh); animation-timing-function:cubic-bezier(.68,-.55,.27,1.55)}
      59% {transform:translate(9vw,21vh);   animation-timing-function:cubic-bezier(.23,1,.32,1)}
      77% {transform:translate(-51vw,36vh); animation-timing-function:cubic-bezier(.25,.46,.45,.94)}
      100%{transform:translate(0,0)}
    }
    @keyframes orb5 {
      0%  {transform:translate(0,0);        animation-timing-function:cubic-bezier(.25,.46,.45,.94)}
      8%  {transform:translate(26vw,56vh);  animation-timing-function:cubic-bezier(.755,.05,.855,.06)}
      23% {transform:translate(-36vw,21vh); animation-timing-function:cubic-bezier(.68,-.55,.27,1.55)}
      39% {transform:translate(9vw,-31vh);  animation-timing-function:cubic-bezier(.23,1,.32,1)}
      54% {transform:translate(41vw,66vh);  animation-timing-function:cubic-bezier(.25,.46,.45,.94)}
      68% {transform:translate(-21vw,41vh); animation-timing-function:cubic-bezier(.755,.05,.855,.06)}
      81% {transform:translate(14vw,-51vh); animation-timing-function:cubic-bezier(.68,-.55,.27,1.55)}
      100%{transform:translate(0,0)}
    }
    .sl-spark{position:absolute;width:2px;height:2px;border-radius:50%;background:#FF4500;will-change:opacity}
    .sl-s1 {top:12%;left:8%;  animation:flk1 2.3s ease-in-out infinite}
    .sl-s2 {top:28%;left:34%; animation:flk2 3.7s ease-in-out infinite  .5s}
    .sl-s3 {top:67%;left:17%; animation:flk3 1.9s ease-in-out infinite 1.2s}
    .sl-s4 {top:41%;left:55%; animation:flk4 4.1s ease-in-out infinite  .3s}
    .sl-s5 {top:83%;left:72%; animation:flk5 2.7s ease-in-out infinite 1.8s}
    .sl-s6 {top:19%;left:88%; animation:flk6 5.3s ease-in-out infinite  .7s}
    .sl-s7 {top:54%;left:43%; animation:flk7 3.1s ease-in-out infinite 2.1s}
    .sl-s8 {top:77%;left:91%; animation:flk8 1.7s ease-in-out infinite  .9s}
    .sl-s9 {top:6%; left:61%; animation:flk9 4.7s ease-in-out infinite  .2s}
    .sl-s10{top:93%;left:28%; animation:flk10 2.9s ease-in-out infinite 1.4s}
    .sl-s11{top:37%;left:79%; animation:flk11 6.1s ease-in-out infinite  .6s}
    .sl-s12{top:61%;left:6%;  animation:flk12 3.3s ease-in-out infinite 2.5s}
    @keyframes flk1  {0%,100%{opacity:0}15%,22%{opacity:.55}40%{opacity:0}70%,75%{opacity:.30}}
    @keyframes flk2  {0%,100%{opacity:0}5%,12%{opacity:.45}30%{opacity:0}55%,65%{opacity:.60}80%{opacity:0}}
    @keyframes flk3  {0%,100%{opacity:0}25%,30%{opacity:.50}50%,55%{opacity:.20}}
    @keyframes flk4  {0%,100%{opacity:0}8%,11%{opacity:.35}45%{opacity:0}75%,82%{opacity:.55}}
    @keyframes flk5  {0%,100%{opacity:0}20%,26%{opacity:.60}60%{opacity:0}85%,90%{opacity:.25}}
    @keyframes flk6  {0%,100%{opacity:0}3%,7%{opacity:.40}35%{opacity:0}60%,68%{opacity:.50}90%{opacity:0}}
    @keyframes flk7  {0%,100%{opacity:0}30%,36%{opacity:.45}70%,73%{opacity:.30}}
    @keyframes flk8  {0%,100%{opacity:0}10%,15%{opacity:.60}45%,50%{opacity:.20}80%{opacity:0}}
    @keyframes flk9  {0%,100%{opacity:0}18%,23%{opacity:.35}55%{opacity:0}78%,85%{opacity:.55}}
    @keyframes flk10 {0%,100%{opacity:0}6%,10%{opacity:.50}40%,45%{opacity:.15}70%{opacity:0}}
    @keyframes flk11 {0%,100%{opacity:0}22%,28%{opacity:.40}50%{opacity:0}75%,80%{opacity:.60}}
    @keyframes flk12 {0%,100%{opacity:0}12%,17%{opacity:.55}42%,48%{opacity:.20}88%{opacity:0}}

    @keyframes shimmer { 0% { left: -60%; } 100% { left: 140%; } }

    /* ── 登录模态框 ── */
    .auth-overlay {
      display: none; position: fixed; inset: 0; z-index: 50;
      background: rgba(2,2,4,0.92); backdrop-filter: blur(14px);
      align-items: center; justify-content: center; padding: 24px;
    }
    .auth-overlay.show { display: flex; }
    .auth-box {
      background: rgba(14,14,18,0.97); border: 1px solid rgba(255,255,255,0.07);
      border-radius: 22px; padding: 40px 36px; width: 360px; max-width: 100%;
      box-shadow: 0 0 100px rgba(0,0,0,0.9), 0 0 40px rgba(255,69,0,0.06),
                  inset 0 1px 0 rgba(255,255,255,0.05);
    }
    .auth-logo {
      font-size: 28px; font-weight: 900; letter-spacing: -2px; margin-bottom: 4px;
      background: linear-gradient(135deg, #FF4500, #FF8C00);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .auth-title { font-size: 14px; color: var(--text2); margin-bottom: 30px; letter-spacing: 0.3px; }
    .auth-label { font-size: 11px; letter-spacing: 3px; color: var(--text2); text-transform: uppercase; margin-bottom: 10px; }
    .auth-row { display: flex; gap: 10px; margin-bottom: 20px; }
    .auth-input {
      width: 100%; background: var(--surface2); border: 1px solid var(--border);
      border-radius: 10px; padding: 13px 16px; color: var(--text); font-size: 15px;
      outline: none; font-family: inherit; transition: border-color 0.3s, box-shadow 0.3s;
    }
    .auth-input:focus { border-color: var(--primary); box-shadow: 0 0 18px rgba(255,69,0,0.15); }
    .auth-input::placeholder { color: #2a2a38; }
    .auth-send-btn {
      background: none; border: 1px solid var(--border); border-radius: 10px;
      padding: 0 14px; color: var(--primary); font-size: 13px; cursor: pointer;
      white-space: nowrap; min-width: 96px; transition: all 0.2s; font-family: inherit;
    }
    .auth-send-btn:hover:not(:disabled) { border-color: var(--primary); box-shadow: 0 0 10px rgba(255,69,0,0.2); }
    .auth-send-btn:disabled { color: var(--text2); border-color: var(--border); cursor: default; }
    .auth-resend-row { text-align: right; margin-top: -12px; margin-bottom: 20px; }
    .auth-resend-btn {
      background: none; border: none; padding: 4px 0;
      color: var(--primary); font-size: 13px; cursor: pointer; font-family: inherit;
    }
    .auth-resend-btn:disabled { color: var(--text2); cursor: default; }
    .auth-code-wrap { margin-bottom: 8px; }
    .auth-btn {
      width: 100%; background: linear-gradient(135deg, #FF4500, #FF8C00);
      border: none; border-radius: 10px; padding: 15px; color: #fff;
      font-size: 15px; font-weight: 700; cursor: pointer; letter-spacing: 1px;
      box-shadow: 0 0 20px rgba(255,69,0,0.25); font-family: inherit;
      transition: opacity 0.2s, transform 0.1s;
    }
    .auth-btn:hover { opacity: 0.88; }
    .auth-btn:active { transform: scale(0.98); }
    .auth-btn:disabled { opacity: 0.35; cursor: default; transform: none; }
    .auth-err { color: #ff4444; font-size: 12px; margin-top: 10px; min-height: 16px; }
    .auth-note { font-size: 12px; color: var(--text2); margin-top: 14px; text-align: center; line-height: 1.65; }
    .auth-trial-btn {
      width: 100%; background: rgba(255,69,0,0.07); border: 1px solid rgba(255,69,0,0.28);
      border-radius: 10px; padding: 15px; color: var(--primary);
      font-size: 15px; font-weight: 600; cursor: pointer; font-family: inherit;
      transition: all 0.2s; margin-bottom: 6px;
    }
    .auth-trial-btn:hover { background: rgba(255,69,0,0.14); }
    .auth-trial-btn:disabled { opacity: 0.35; cursor: default; }
    .auth-or {
      display: flex; align-items: center; gap: 10px;
      color: var(--text2); font-size: 12px; margin: 16px 0 14px;
    }
    .auth-or::before, .auth-or::after { content: ''; flex: 1; height: 1px; background: var(--border); }
    .dev-hint {
      background: rgba(255,140,0,0.07); border: 1px solid rgba(255,140,0,0.2);
      border-radius: 8px; padding: 9px 13px; margin-top: 12px;
      font-size: 13px; color: var(--primary2); display: none;
    }
    .dev-hint.show { display: block; }

    /* ── 头部用户信息 ── */
    .h-right { display: flex; align-items: center; gap: 10px; }
    .h-phone { font-size: 12px; color: var(--text2); }
    .h-badge {
      font-size: 10px; font-weight: 700; padding: 3px 9px;
      border-radius: 100px; letter-spacing: 1px;
    }
    .h-badge.free { background: rgba(255,255,255,0.04); color: var(--text2); border: 1px solid var(--border); }
    .h-badge.pro { background: linear-gradient(135deg,#FF4500,#FF8C00); color:#fff; }
    .h-upgrade {
      font-size: 12px; color: var(--primary); cursor: pointer;
      border: 1px solid rgba(255,69,0,0.22); border-radius: 6px;
      padding: 4px 11px; background: none; font-family: inherit; transition: all 0.2s;
    }
    .h-upgrade:hover { background: rgba(255,69,0,0.07); box-shadow: 0 0 10px rgba(255,69,0,0.18); }
    @media (max-width: 680px) { .h-phone { display: none; } }

    /* ── 升级弹窗 ── */
    .upgrade-overlay {
      display: none; position: fixed; inset: 0; z-index: 60;
      background: rgba(0,0,0,0.82); backdrop-filter: blur(12px);
      align-items: center; justify-content: center; padding: 24px;
    }
    .upgrade-overlay.show { display: flex; }
    .upgrade-box {
      background: var(--surface); border: 1px solid rgba(255,69,0,0.3);
      border-radius: 22px; padding: 36px 32px; width: 360px; max-width: 100%;
      text-align: center; box-shadow: 0 0 80px rgba(255,69,0,0.1);
    }
    .up-title { font-size: 22px; font-weight: 800; margin-bottom: 8px; letter-spacing: -0.5px; }
    .up-sub { font-size: 14px; color: var(--text2); margin-bottom: 24px; line-height: 1.65; }
    .up-price {
      font-size: 56px; font-weight: 900; letter-spacing: -4px; line-height: 1;
      background: linear-gradient(135deg,#FF4500,#FF8C00);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .up-period { font-size: 14px; color: var(--text2); margin: 4px 0 28px; }
    .up-btn {
      display: block; width: 100%; padding: 15px; background: linear-gradient(135deg,#FF4500,#FF8C00);
      border: none; border-radius: 10px; color: #fff; font-size: 16px; font-weight: 700;
      cursor: pointer; box-shadow: 0 0 24px rgba(255,69,0,0.28); font-family: inherit;
      transition: opacity 0.2s; margin-bottom: 12px;
    }
    .up-btn:hover { opacity: 0.88; }
    .up-cancel { font-size: 13px; color: var(--text2); cursor: pointer; background: none; border: none; font-family: inherit; }
    .up-cancel:hover { color: var(--text2); opacity: 0.7; }

    /* ── 聊天页 ── */
    #chatScreen {
      display: flex; flex-direction: row;
      height: 100vh; height: 100dvh;
      position: relative; z-index: 5;
    }

    /* ── 侧边栏 ── */
    .sidebar {
      width: 240px; flex-shrink: 0;
      background: rgba(10,10,14,0.95);
      border-right: 1px solid var(--border);
      display: flex; flex-direction: column;
      position: relative; z-index: 6;
      transition: transform 0.25s ease;
    }
    .sidebar-header {
      padding: 16px 16px 14px;
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
      flex-shrink: 0;
    }
    .s-logo {
      font-size: 20px; font-weight: 900; letter-spacing: -1px;
      background: linear-gradient(135deg, #FF4500, #FF8C00);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      filter: drop-shadow(0 0 8px rgba(255,69,0,0.4));
    }
    .s-new {
      background: none; border: 1px solid var(--border); border-radius: 7px;
      width: 30px; height: 30px; cursor: pointer; color: var(--text2);
      font-size: 18px; line-height: 1; display: flex; align-items: center; justify-content: center;
      transition: all 0.2s;
    }
    .s-new:hover { border-color: var(--primary); color: var(--primary); box-shadow: 0 0 10px var(--glow); }
    .history-list {
      flex: 1; overflow-y: auto; padding: 8px 6px;
    }
    .history-list::-webkit-scrollbar { width: 2px; }
    .history-list::-webkit-scrollbar-thumb { background: #1e1e28; border-radius: 2px; }
    .history-empty {
      padding: 28px 12px; text-align: center;
      color: var(--text2); font-size: 12px; letter-spacing: 0.5px; line-height: 1.8;
    }
    .history-item {
      padding: 9px 12px; border-radius: 8px; cursor: pointer;
      margin-bottom: 2px; transition: background 0.15s;
      border: 1px solid transparent;
      position: relative;
    }
    .history-item:hover { background: var(--surface2); }
    .history-item.active {
      background: rgba(255,69,0,0.08);
      border-color: rgba(255,69,0,0.2);
    }
    .hi-title {
      font-size: 13px; color: var(--text);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .hi-time { font-size: 10px; color: var(--text2); margin-top: 3px; }
    .hi-del {
      position: absolute; right: 8px; top: 50%; transform: translateY(-50%);
      background: none; border: none; color: var(--text2); cursor: pointer;
      font-size: 14px; opacity: 0; transition: opacity 0.15s;
      padding: 2px 4px; border-radius: 4px;
    }
    .history-item:hover .hi-del { opacity: 1; }
    .hi-del:hover { color: #ff4444; }

    /* 移动端侧边栏遮罩 */
    .sidebar-overlay {
      display: none; position: fixed; inset: 0; z-index: 5;
      background: rgba(0,0,0,0.6);
    }
    .sidebar-overlay.show { display: block; }

    /* ── 主聊天区 ── */
    .chat-main {
      flex: 1; display: flex; flex-direction: column; min-width: 0;
    }
    .chat-header {
      background: rgba(14,14,18,0.9); backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
      padding: 0 24px; height: 58px;
      display: flex; align-items: center; justify-content: space-between;
      flex-shrink: 0;
    }
    .h-left { display: flex; align-items: center; gap: 12px; }
    .h-menu {
      display: none; background: none; border: none;
      color: var(--text2); cursor: pointer; font-size: 18px; padding: 4px;
    }
    .h-logo {
      font-size: 20px; font-weight: 900; letter-spacing: -1px;
      background: linear-gradient(135deg, #FF4500, #FF8C00);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      filter: drop-shadow(0 0 8px rgba(255,69,0,0.4));
    }
    .h-divider { width: 1px; height: 16px; background: var(--border); }
    .h-model {
      font-size: 11px; color: var(--text2); letter-spacing: 1px;
      display: flex; align-items: center; gap: 6px;
    }
    .h-dot {
      width: 5px; height: 5px; border-radius: 50%;
      background: #FF4500; box-shadow: 0 0 6px #FF4500;
      animation: blink 2s ease-in-out infinite;
    }
    @keyframes blink { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }

    .messages {
      flex: 1; overflow-y: auto; padding: 28px 28px;
      display: flex; flex-direction: column; gap: 18px;
    }
    .messages::-webkit-scrollbar { width: 3px; }
    .messages::-webkit-scrollbar-thumb { background: #1e1e28; border-radius: 2px; }

    .msg {
      max-width: 76%; line-height: 1.75; font-size: 15px;
      padding: 14px 18px; border-radius: 14px; word-break: break-word;
    }
    .msg.user {
      background: linear-gradient(135deg, #FF4500, #FF8C00);
      color: #fff; align-self: flex-end; border-bottom-right-radius: 4px;
      box-shadow: 0 4px 24px rgba(255,69,0,0.3);
    }
    .msg.bot {
      background: rgba(22,22,28,0.95); border: 1px solid var(--border);
      align-self: flex-start; border-bottom-left-radius: 4px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.4);

    .cursor { display: inline-block; width: 2px; height: 1em; background: var(--primary); margin-left: 2px; vertical-align: text-bottom; animation: cur 0.8s step-end infinite; }

    /* ── 副业诊断模态框 ── */

</head>

<!-- 登录模态框 -->

<!-- 聊天页 -->
<div id="chatScreen">

            <path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/>

<script>


/* ── 认证系统 ── */
let currentToken = localStorage.getItem('hou_token');
let currentUser = null;

async function checkAuth() {
  if (!currentToken) {
    showAuthModal();
    return;
  }
  try {
    const r = await fetch('/api/me', { headers: { 'Authorization': `Bearer ${currentToken}` } });
    if (!r.ok) { localStorage.removeItem('hou_token'); currentToken = null; checkAuth(); return; }
    currentUser = await r.json();
    updateUserHeader();
    loadRemoteHistory();
    showEmpty();
  } catch { showAuthModal(); }
}

function showAuthModal() {
  // 每次清空手机号，强制重新输入
  const inp = document.getElementById('authPhone');
  if (inp) inp.value = '';
  const mainBtn = document.getElementById('authMainBtn');
  if (mainBtn) mainBtn.disabled = true;
  setAuthErr('');
  // 更新试用剩余次数
  const guestCount = parseInt(localStorage.getItem('hou_guest_count') || '0');
  const remaining = Math.max(0, 2 - guestCount);
  const trialRemain = document.getElementById('trialRemain');
  const trialSection = document.getElementById('trialSection');
  const orDivider = document.getElementById('authOrDivider');
  if (trialRemain) trialRemain.textContent = remaining;
  if (remaining <= 0) {
    if (trialSection) trialSection.style.display = 'none';
    if (orDivider) orDivider.style.display = 'none';
  } else {
    if (trialSection) trialSection.style.display = 'block';
    if (orDivider) orDivider.style.display = 'flex';
  }
  document.getElementById('authOverlay').classList.add('show');
}
function hideAuthModal() { document.getElementById('authOverlay').classList.remove('show'); }

function startFreeTrial() {
  hideAuthModal();
  showEmpty();
  updateGuestHeader();
}

function onPhoneInput() {
  const v = document.getElementById('authPhone').value.trim();
  document.getElementById('authMainBtn').disabled = !/^1[3-9]\d{9}$/.test(v);
  setAuthErr('');
}

async function doAuthMain() {
  const phone = document.getElementById('authPhone').value.trim();
  if (!/^1[3-9]\d{9}$/.test(phone)) return;
  const btn = document.getElementById('authMainBtn');
  btn.disabled = true; btn.textContent = '登录中…'; setAuthErr('');
  try {
    const r = await fetch('/api/beta-login', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ phone })
    });
    const d = await r.json();
    if (!d.ok) {
      setAuthErr(d.error || '登录失败，请重试');
      btn.disabled = false; btn.textContent = '进入 HOU';
      return;
    }
    currentToken = d.token; localStorage.setItem('hou_token', currentToken);
    hideAuthModal();
    localStorage.removeItem('hou_guest_count');
    localStorage.removeItem('hou_visited');
    track('login', { method: 'phone' });
    await refreshUserInfo();
    updateUserHeader();
    showEmpty();
    loadRemoteHistory();
  } catch {
    setAuthErr('网络错误，请重试');
    btn.disabled = false; btn.textContent = '进入 HOU';
  }
}

function setAuthErr(msg) { document.getElementById('authErr').textContent = msg; }

async function refreshUserInfo() {
  if (!currentToken) return;
  try {
    const r = await fetch('/api/me', { headers: { 'Authorization': `Bearer ${currentToken}` } });
    if (r.ok) currentUser = await r.json();
  } catch {}
}

function maskPhone(p) { return p.slice(0,3) + '****' + p.slice(-4); }

function updateUserHeader() {
  if (!currentUser) return;
  const el = document.getElementById('hRight');
  const isPro = currentUser.is_pro;
  const rem = currentUser.remaining;
  el.innerHTML = `
    <span class="h-phone">${maskPhone(currentUser.phone)}</span>
    <span class="h-badge ${isPro?'pro':'free'}">${isPro?'无限次':`${rem??0}次`}</span>
    ${!isPro?`<button class="h-upgrade" onclick="showUpgrade()">升级 Pro</button>`:''}
  `;
  if (typeof applyChatLang === 'function') applyChatLang(window._chatLang || localStorage.getItem('hou_lang') || 'zh');
}

function showUpgrade() { document.getElementById('upgradeOverlay').classList.add('show'); }
function closeUpgrade() { document.getElementById('upgradeOverlay').classList.remove('show'); }
function goPro() { alert('支付功能即将上线！'); }

function updateGuestHeader() {
  const el = document.getElementById('hRight');
  const guestCount = parseInt(localStorage.getItem('hou_guest_count') || '0');
  const remaining = 2 - guestCount;
  el.innerHTML = `
    <span class="h-phone">免费体验 ${remaining} 次</span>
    <button class="h-upgrade" onclick="showAuthModal()">登录</button>
  `;
}

checkAuth();

/* SYSTEM prompt 已移至服务端 api/chat.js，前端不再持有 */

/* ── 历史对话管理 ── */
const STORAGE_KEY = 'hou_sessions';
let currentSessionId = null;
let msgs = [];

// 从服务端加载历史，登录后调用
async function loadRemoteHistory() {
  if (!currentToken) return;
  try {
    const r = await fetch('/api/conversations', {
      headers: { 'Authorization': `Bearer ${currentToken}` }
    });
    if (!r.ok) return;
    const remote = await r.json();
    if (!Array.isArray(remote)) return;

    if (remote.length > 0) {
      const sessions = remote.map(c => ({
        id: c.id,
        title: c.title,
        messages: c.messages,
        updatedAt: new Date(c.updated_at).getTime()
      }));
      saveSessions(sessions);
    } else {
      getSessions().forEach(s => syncSessionToServer(s));
    }
    renderHistory();
  } catch {}
}

// 把单条 session 异步同步到服务端（fire-and-forget）
function syncSessionToServer(session) {
  if (!currentToken || !session) return;
  fetch('/api/conversations', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${currentToken}` },
    body: JSON.stringify(session)
  }).catch(() => {});
}

// 从服务端删除单条 session（fire-and-forget）
function deleteSessionFromServer(id) {
  if (!currentToken) return;
  fetch(`/api/conversations?id=${encodeURIComponent(id)}`, {
    method: 'DELETE',
    headers: { 'Authorization': `Bearer ${currentToken}` }
  }).catch(() => {});
}

function getSessions() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; }
  catch { return []; }
}

function saveSessions(sessions) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(sessions));
}

function saveCurrentSession() {
  if (msgs.length === 0) return;
  const sessions = getSessions();
  const title = msgs.find(m => m.role === 'user')?.content?.slice(0, 24) || '新对话';
  if (!currentSessionId) currentSessionId = Date.now().toString();
  const idx = sessions.findIndex(s => s.id === currentSessionId);
  const session = { id: currentSessionId, title, messages: msgs, updatedAt: Date.now() };
  if (idx >= 0) sessions[idx] = session;
  else sessions.unshift(session);
  saveSessions(sessions);
  renderHistory();
  syncSessionToServer(session);
}

function deleteSession(id, e) {
  e.stopPropagation();
  const sessions = getSessions().filter(s => s.id !== id);
  saveSessions(sessions);
  if (currentSessionId === id) {
    currentSessionId = null;
    msgs = [];
    showEmpty();
  }
  renderHistory();
  deleteSessionFromServer(id);
}

function loadSession(id) {
  const session = getSessions().find(s => s.id === id);
  if (!session) return;
  currentSessionId = id;
  msgs = [...session.messages];
  const m = document.getElementById('messages');
  m.innerHTML = '';
  msgs.forEach(msg => {
    if (msg.role === 'system') return;
    const div = document.createElement('div');
    div.className = `msg ${msg.role === 'user' ? 'user' : 'bot'}`;
    div.innerHTML = fmt(msg.content);
    m.appendChild(div);
  });
  scrollBot();
  renderHistory();
  if (window.innerWidth <= 680) closeSidebar();
}

function formatTime(ts) {
  const d = new Date(ts);
  const now = new Date();
  if (d.toDateString() === now.toDateString()) {
    return d.toLocaleTimeString('zh', { hour: '2-digit', minute: '2-digit' });
  }
  const diff = now - d;
  if (diff < 86400000 * 2) return '昨天';
  return `${d.getMonth()+1}月${d.getDate()}日`;
}

function esc(t) {
  return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function renderHistory() {
  const sessions = getSessions();
  const list = document.getElementById('historyList');
  if (sessions.length === 0) {
    list.innerHTML = '<div class="history-empty">还没有历史对话<br>开始你的第一次对话</div>';
    return;
  }
  list.innerHTML = sessions.map(s => `
    <div class="history-item ${s.id === currentSessionId ? 'active' : ''}" onclick="loadSession('${s.id}')">
      <div class="hi-title">${esc(s.title)}</div>
      <div class="hi-time">${formatTime(s.updatedAt)}</div>
      <button class="hi-del" onclick="deleteSession('${s.id}', event)" title="删除">×</button>
    </div>
  `).join('');
}

/* ── 聊天 ── */
const TAGS = [
  { label: '副业诊断', cls: 'diagnose-tag', action: "openDiagnose()" },
  { label: '帮我找赚钱方向', cls: '', action: "quickSend('我想找一个适合自己的赚钱方向，根据我的情况帮我分析')" },
  { label: '生意遇到瓶颈', cls: '', action: "quickSend('我的生意遇到了瓶颈，帮我找突破口')" },
  { label: '帮我做一个决策', cls: '', action: "quickSend('我面临一个重要决策，帮我分析利弊和建议')" },
];

function showEmpty() {
  const m = document.getElementById('messages');
  m.innerHTML = '';
  const h = document.createElement('div');
  h.className = 'empty-hint'; h.id = 'emptyHint';
  const _it = (typeof I18N_CHAT !== 'undefined') ? (I18N_CHAT[window._chatLang || 'zh'] || I18N_CHAT.zh) : null;
  const _small = _it ? _it.emptySmall : '钱·副业·方向，说出来';
  const _tLabels = _it ? _it.tags : TAGS.map(x => x.label);
  h.innerHTML = `<div class="empty-big">HOU</div><div class="empty-small">${_small}</div><div class="empty-tags">${TAGS.map((tg,i)=>`<div class="tag ${tg.cls}" onclick="${tg.action}">${_tLabels[i]||tg.label}</div>`).join('')}</div>`;
  m.appendChild(h);
}

function quickSend(text) {
  document.getElementById('userInput').value = text;
  sendMsg();
}

function newChat() {
  saveCurrentSession();
  currentSessionId = null;
  msgs = [];
  showEmpty();
  if (window.innerWidth <= 680) closeSidebar();
}

function addMsg(role, text) {
  const hint = document.getElementById('emptyHint');
  if (hint) hint.remove();
  const div = document.createElement('div');
  div.className = `msg ${role === 'user' ? 'user' : 'bot'}`;
  div.innerHTML = role !== 'user' ? '' : fmt(text);
  document.getElementById('messages').appendChild(div);
  scrollBot();
  return div;
}

function fmt(t) {
  return t
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>')
    .replace(/\n/g,'<br>');
}

let _userScrolled = false;
document.getElementById('messages').addEventListener('scroll', function() {
  const atBottom = this.scrollTop + this.clientHeight >= this.scrollHeight - 60;
  _userScrolled = !atBottom;
});

function scrollBot() {
  if (_userScrolled) return;
  const m = document.getElementById('messages');
  m.scrollTop = m.scrollHeight;
}
function handleKey(e) { if (e.key==='Enter' && !e.shiftKey) { e.preventDefault(); sendMsg(); } }
function autoResize(el) { el.style.height = 'auto'; el.style.height = Math.min(el.scrollHeight,160)+'px'; }

async function sendMsg() {
  const inp = document.getElementById('userInput');
  const text = inp.value.trim();
  if (!text) return;
  if (!currentToken) {
    const guestCount = parseInt(localStorage.getItem('hou_guest_count') || '0');
    if (localStorage.getItem('hou_visited') === 'true' || guestCount >= 2) {
      showAuthModal(); return;
    }
  }
  inp.value = ''; inp.style.height = 'auto';
  _userScrolled = false;

  addMsg('user', text);
  msgs.push({ role:'user', content:text });

  const loader = document.createElement('div');
  loader.className = 'typing';
  loader.innerHTML = '<div class="dot"></div><div class="dot"></div><div class="dot"></div>';
  document.getElementById('messages').appendChild(loader);
  scrollBot();

  try {
    const res = await fetch('/api/chat', {
      method:'POST', headers:{
        'Content-Type':'application/json',
        'Authorization': currentToken ? `Bearer ${currentToken}` : ''
      },
      body: JSON.stringify({ messages: msgs })
    });
    loader.remove();
    if (res.status === 401) { showAuthModal(); return; }
    if (res.status === 403) {
      const fd = await res.json().catch(()=>({}));
      if (fd.error === 'limit_reached') { showUpgrade(); return; }
      addMsg('bot','服务暂时不可用。'); return;
    }
    if (!res.ok) { addMsg('bot','连接出错，请稍后重试。'); return; }

    // 乐观更新：立刻显示 -1，流结束后再与服务端同步
    if (currentUser && !currentUser.is_pro && currentUser.remaining != null) {
      currentUser.remaining = Math.max(0, currentUser.remaining - 1);
      updateUserHeader();
    }

    const botDiv = addMsg('bot','');
    const reader = res.body.getReader();
    const dec = new TextDecoder();
    let full = '', buf = '';

    while (true) {
      const {done,value} = await reader.read();
      if (done) break;
      buf += dec.decode(value, {stream:true});
      const lines = buf.split('\n'); buf = lines.pop();
      for (const line of lines) {
        if (!line.startsWith('data: ')) continue;
        const data = line.slice(6);
        if (data === '[DONE]') break;
        try {
          const j = JSON.parse(data);
          const delta = j.choices?.[0]?.delta;
          if (delta?.reasoning_content) continue;
          if (delta?.content) {
            full += delta.content;
            botDiv.innerHTML = fmt(full);
            scrollBot();
          }
        } catch {}
      }
    }
    msgs.push({ role:'assistant', content:full });
    saveCurrentSession();
    track('message_sent', { session_id: currentSessionId });
    if (!currentToken) {
      const newCount = parseInt(localStorage.getItem('hou_guest_count') || '0') + 1;
      localStorage.setItem('hou_guest_count', newCount);
      if (newCount >= 2) localStorage.setItem('hou_visited', 'true');
      updateGuestHeader();
    }
    await refreshUserInfo(); updateUserHeader();
  } catch {
    loader.remove();
    addMsg('bot','网络错误，请检查连接后重试。');
  }
}

/* ── 副业诊断器 ── */
const DIAGNOSE_QUESTIONS = [
  {
    q: '你现在的身份是？',
    opts: ['在校学生', '上班族 / 打工人', '自由职业 / 兼职状态', '已经在创业']
  },
  {
    q: '每周能抽出多少时间做副业？',
    opts: ['5小时以内（碎片时间）', '5–15小时（每天1-2小时）', '15–30小时（相当于兼职）', '30小时以上，全力投入']
  },
  {
    q: '启动资金大概多少？',
    opts: ['几乎为零（纯时间换钱）', '500元以内', '500–3000元', '3000元以上，不是问题']
  },
  {
    q: '你最拿得出手的能力是哪个方向？',
    opts: ['文字 / 内容 / 表达', '设计 / 绘画 / 视频剪辑', '销售 / 运营 / 推广拉新', '技术 / 编程 / AI工具', '教学 / 服务 / 咨询', '还没想清楚']
  },
  {
    q: '你最想要的结果是？',
    opts: ['快速有收入（1个月内见到钱）', '慢慢建资产（可持续，不急）', '先验证方向，赚到了再加码']
  }
];

let dStep = 0;
let dAnswers = [];

function openDiagnose() {
  dStep = 0;
  dAnswers = new Array(DIAGNOSE_QUESTIONS.length).fill(null);
  document.getElementById('diagnoseModal').classList.add('show');
  renderDiagnoseStep();
}

function closeDiagnose() {
  document.getElementById('diagnoseModal').classList.remove('show');
}

function renderDiagnoseStep() {
  const total = DIAGNOSE_QUESTIONS.length;
  const q = DIAGNOSE_QUESTIONS[dStep];

  // 进度条
  document.getElementById('dStepBar').innerHTML = DIAGNOSE_QUESTIONS.map((_, i) =>
    `<div class="d-step-dot ${i < dStep ? 'done' : i === dStep ? 'active' : ''}"></div>`
  ).join('');

  // 问题
  document.getElementById('dQuestion').textContent = q.q;

  // 选项
  document.getElementById('dOptions').innerHTML = q.opts.map((o, i) =>
    `<button class="d-option ${dAnswers[dStep] === i ? 'selected' : ''}" onclick="selectDOption(${i})">${o}</button>`
  ).join('');

  // 导航
  const backBtn = document.getElementById('dBack');
  const nextBtn = document.getElementById('dNext');
  backBtn.style.visibility = dStep === 0 ? 'hidden' : 'visible';
  nextBtn.textContent = dStep === total - 1 ? '开始诊断 →' : '继续 →';
  nextBtn.disabled = dAnswers[dStep] === null;
}

function selectDOption(idx) {
  dAnswers[dStep] = idx;
  renderDiagnoseStep();
}

function prevStep() {
  if (dStep > 0) { dStep--; renderDiagnoseStep(); }
}

function nextStep() {
  if (dAnswers[dStep] === null) return;
  if (dStep < DIAGNOSE_QUESTIONS.length - 1) {
    dStep++;
    renderDiagnoseStep();
  } else {
    runDiagnose();
  }
}

/* ── 设置菜单 ── */
let _settingsOpen = false;

function toggleSettings(e) {
  e.stopPropagation();
  _settingsOpen = !_settingsOpen;
  document.getElementById('settingsMenu').classList.toggle('open', _settingsOpen);
}

document.addEventListener('click', function(e) {
  if (!_settingsOpen) return;
  const widget = document.getElementById('settingsWidget');
  if (widget && !widget.contains(e.target)) {
    _settingsOpen = false;
    document.getElementById('settingsMenu').classList.remove('open');
  }
});

function doLogout() {
  localStorage.clear();
  window.location.href = '/';
}

function openFeedback() {
  document.getElementById('feedbackText').value = '';
  document.getElementById('feedbackErr').textContent = '';
  document.getElementById('feedbackBtn').disabled = false;
  document.getElementById('feedbackBtn').textContent = '提交';
  document.getElementById('feedbackOverlay').classList.add('show');
  document.getElementById('settingsMenu').classList.remove('open');
  _settingsOpen = false;
}

function closeFeedback() {
  document.getElementById('feedbackOverlay').classList.remove('show');
}

async function submitFeedback() {
  const content = document.getElementById('feedbackText').value.trim();
  if (!content) { document.getElementById('feedbackErr').textContent = '请输入内容'; return; }
  const btn = document.getElementById('feedbackBtn');
  btn.disabled = true; btn.textContent = '提交中…';
  try {
    await track('feedback', { content });
    btn.textContent = '已提交';
    setTimeout(closeFeedback, 1000);
  } catch {
    document.getElementById('feedbackErr').textContent = '提交失败，请重试';
    btn.disabled = false; btn.textContent = '提交';
  }
}

    tags: ['副业诊断', '帮我找赚钱方向', '生意遇到瓶颈', '帮我做一个决策'],

    tags: ['Side Hustle Scan', 'Find my money move', 'Business breakthrough', 'Help me decide'],

function applyChatLang(l) {
  window._chatLang = l;
  const t = I18N_CHAT[l] || I18N_CHAT.zh;
  // placeholder
  const inp = document.getElementById('userInput');
  if (inp) inp.placeholder = t.placeholder;
  // 设置菜单标签
  const lbl = document.getElementById('smLangLabel');
  if (lbl) lbl.textContent = t.langLabel;
  const btnZh = document.getElementById('smBtnZh');
  const btnEn = document.getElementById('smBtnEn');
  if (btnZh) btnZh.classList.toggle('active', l === 'zh');
  if (btnEn) btnEn.classList.toggle('active', l === 'en');
  const logoutBtn = document.getElementById('smLogoutBtn');
  if (logoutBtn) logoutBtn.textContent = t.logout;
  const settingsLbl = document.getElementById('settingsBtnLabel');
  if (settingsLbl) settingsLbl.textContent = t.settingsLabel;
  // html lang 属性
  document.documentElement.lang = l === 'zh' ? 'zh-CN' : 'en';
  // 空状态界面
  const emptyHint = document.getElementById('emptyHint');
  if (emptyHint) {
    const sm = emptyHint.querySelector('.empty-small');
    if (sm) sm.textContent = t.emptySmall;
    const tagsEl = emptyHint.querySelector('.empty-tags');
    if (tagsEl) {
      tagsEl.innerHTML = TAGS.map((tg, i) =>
        `<div class="tag ${tg.cls}" onclick="${tg.action}">${t.tags[i] || tg.label}</div>`
      ).join('');
    }
  }
  // 历史为空提示
  const histEl = document.querySelector('.history-empty');
  if (histEl) histEl.innerHTML = t.historyEmpty;
}

function setLang(l) {
  window._chatLang = l;
  localStorage.setItem('hou_lang', l);
  applyChatLang(l);
  window.dispatchEvent(new CustomEvent('hou-lang', { detail: l }));
}

// 初始化语言
applyChatLang(window._chatLang);

/* ── 错误监控（#11） ── */
function logError(msg, source, line_no, col_no, stack) {
  fetch('/api/log-error', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      ...(currentToken ? { 'Authorization': `Bearer ${currentToken}` } : {})
    },
    body: JSON.stringify({ message: msg, source, line_no, col_no, stack, url: location.href })
  }).catch(() => {});
}
window.onerror = (msg, src, line, col, err) => { logError(String(msg), src, line, col, err?.stack); return false; };
window.onunhandledrejection = e => { logError(String(e.reason?.message || e.reason), '', 0, 0, e.reason?.stack); };

/* ── 埋点（#12） ── */
function track(name, props) {
  fetch('/api/track', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      ...(currentToken ? { 'Authorization': `Bearer ${currentToken}` } : {})
    },
    body: JSON.stringify({ name, props: props || {}, url: location.href })
  }).catch(() => {});
}
track('page_view', { page: 'chat' });

function runDiagnose() {
  closeDiagnose();

  const answers = DIAGNOSE_QUESTIONS.map((q, i) => `${q.q}${q.opts[dAnswers[i]]}`).join('\n');

  const prompt = `请根据我的真实情况，给我一份专属副业诊断报告。

我的情况：
${answers}

请输出：

**最适合我的3条副业路径**
每条路径包含：路径名称 / 月收入预期（给具体数字）/ 最大风险点 / 今天就能开始的第一步

**本周行动清单**
7件事，每件10分钟内能启动，按优先级排列。

要求：不要泛泛建议，基于我的情况给出具体的、今天就能动手的答案。`;

  const inp = document.getElementById('userInput');
  inp.value = prompt;
  sendMsg();
}
